<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengkonversi Gaya Teks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h2>Pengkonversi Gaya Teks</h2>
        <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

        <label for="inputText">Masukkan teks:</label>
        <textarea id="inputText" placeholder="Kata-kata..."></textarea>

        <div class="stats">
            Huruf: <span id="charCount">0</span>, 
            huruf besar: <span id="upperCount">0</span>, 
            huruf kecil: <span id="lowerCount">0</span>
        </div>

        <div class="button-group">
            <button onclick="transform('upper')">Besarkan</button>
            <button onclick="transform('lower')">Kecilkan</button>
            <button onclick="transform('sentence')">Paragrafkan</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>\
