<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengkonversi Gaya Teks</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

<h2>Pengkonversi Gaya Teks</h2>
<p>Alat ini bisa menghitung huruf kecil dan mengubah teks.</p>

<label>Masukkan teks:</label>
<textarea id="inputText" placeholder="Kata-kata..."></textarea>

<div class="stats">
    <span id="hk">Huruf kecil: 0</span>
</div>

<div class="button-group">
    <button id="huruf-besar">Huruf Besar</button>
    <button id="huruf-kecil">Huruf Kecil</button>
</div>

<br><br>

<label>Hasil:</label>
<textarea id="editor-kecil" placeholder="Hasil akan muncul di sini"></textarea>

</div>

<script src="index.js"></script>
</body>
</html>
